services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.12.0
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "*"
      --cors-allowed-origins "*"
    ports:
      - "5050:5000"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"
      interval: 5s
      timeout: 3s
      retries: 30

  # One-shot: seeds a demo experiment, runs, and a registered model.
  #   docker compose run --rm seed
  seed:
    image: ghcr.io/mlflow/mlflow:v3.12.0
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./dev:/seed:ro
    command: ["python", "/seed/seed.py"]
    profiles: ["seed"]

  # MCP server, stdio. Run interactively for manual probing:
  #   docker compose run --rm mcp
  mcp:
    build: .
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_ID: "1"
      MLFLOW_ALLOW_WRITE: "true"
    stdin_open: true
    tty: false
    profiles: ["mcp"]

volumes:
  mlflow-data:
